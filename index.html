<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>전북 세출예산 집행 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  :root {
    --bg:#0f1116; --card:#171a21; --line:#262b36; --tx:#e7e9ee; --mut:#9aa0ab;
    --ac:#5b9cf0; --home:#f0a35b; --good:#3ddc97; --prov:#c084fc; --etc:#6b7280;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body { font-family: system-ui, 'Malgun Gothic', sans-serif; max-width: 1120px; margin: 0 auto;
         padding: 20px 18px calc(64px + env(safe-area-inset-bottom)); background: var(--bg); color: var(--tx);
         overflow-x: hidden; }
  h1 { font-size: clamp(18px, 5vw, 23px); margin: 0 0 4px; letter-spacing: -.4px; font-weight: 700; }
  h2 { font-size: 14px; margin: 26px 0 12px; color: var(--tx); font-weight: 600; letter-spacing: -.2px; }
  .sub { color: var(--mut); font-size: 12.5px; line-height: 1.5; }
  .rbtn { float: right; background: var(--ac); color: #0a1020; border: 0; border-radius: 99px;
          padding: 4px 12px; font-size: 11.5px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .rbtn.q { background: #2a3446; color: #9fc0ff; margin-right: 9px; }   /* 분기 버튼 = 다른 색 + 다시재생과 간격 */
  .qinfo { cursor: pointer; color: var(--ac, #8fb4ff); font-weight: 400; font-size: 13px; user-select: none; }
  .qinfo:hover { opacity: .75; }
  /* 소비투자 ↔ 신속집행 세그먼트 토글 */
  .segtoggle { display: inline-flex; background: #12151c; border: 1px solid var(--line); border-radius: 11px; padding: 3px; gap: 2px; margin: 4px 0 6px; }
  .segtoggle button { border: 0; background: transparent; color: var(--mut); font-weight: 700; font-size: 13px; padding: 7px 15px; border-radius: 8px; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .segtoggle button.segon { background: var(--ac); color: #0a1020; }
  .segtoggle button small { font-weight: 500; font-size: 10.5px; opacity: .75; margin-left: 3px; }
  /* 집행률 범례 점 */
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 2px; vertical-align: middle; margin: -2px 3px 0 7px; }
  .dot:first-child { margin-left: 0; }
  .dot.g { background: #3ddc97; } .dot.y { background: #e2c23b; } .dot.r { background: #ef5d5d; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px;
          min-width: 0; overflow: hidden; }
  .card.home { border-color: var(--home); box-shadow: 0 0 0 1px var(--home) inset; }
  .ct { font-size: 12.5px; color: var(--mut); margin: 0 0 8px; font-weight: 600; }
  .ctd { float: right; font-weight: 400; font-size: 11px; color: var(--mut); opacity: .8; }

  /* 반응형 그리드 — minmax 로 자동 줄바꿈(모바일 1단) */
  .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(min(270px, 100%), 1fr)); }
  .deptwrap { display: grid; gap: 12px; grid-template-columns: minmax(0, 1fr); }
  @media (min-width: 880px) { .deptwrap { grid-template-columns: minmax(0, 1.05fr) minmax(0, 1fr); align-items: start; } }

  .gauge-card { display: flex; flex-direction: column; }
  .badge { display: inline-block; background: var(--home); color: #1a1208; font-weight: 700;
           font-size: 12px; padding: 3px 10px; border-radius: 99px; }
  .kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; }
  .kpis.k3 { grid-template-columns: 1fr 1fr 1fr; }
  .kpi { background: #11141a; border: 1px solid var(--line); border-radius: 10px; padding: 9px 11px; }
  .kpi-sub { margin-top: 8px; font-size: 11px; color: var(--mut); text-align: center; font-variant-numeric: tabular-nums; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  @media (max-width: 640px) { .kpi-sub { font-size: 10px; } }
  .kpi-sub b { color: var(--tx); font-weight: 700; }
  .kpi-sub .pl { color: #e0a06a; }
  .kpi .k { color: var(--mut); font-size: 11px; }
  .kpi .v { font-size: 16px; font-weight: 700; margin-top: 2px; font-variant-numeric: tabular-nums; }

  .ec { width: 100%; min-width: 0; }
  /* 부서 드릴다운 패널 */
  .panel { max-height: 460px; overflow-y: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .panel::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .upd { color: #ff5d5d; font-weight: 700; }
  .tag.hot { color: #ff9a6b; background: #2c1d16; font-weight: 600; }
  .gmax { color: var(--mut); font-size: 11px; }
  .panel-h { font-size: 14px; font-weight: 700; margin: 2px 0 4px; color: var(--home); }
  .panel-s { font-size: 11.5px; color: var(--mut); margin-bottom: 10px; }
  .biz { font-size: 13px; padding: 8px 0; border-bottom: 1px solid var(--line); }
  .biz:last-child { border-bottom: 0; }
  .biz .t { display: flex; justify-content: space-between; gap: 10px; align-items: baseline; }
  .biz .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .biz .a { color: var(--good); white-space: nowrap; font-variant-numeric: tabular-nums; font-weight: 600; }
  .biz .m { color: var(--mut); font-size: 11px; margin-top: 1px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .prog { height: 5px; background: #222836; border-radius: 3px; margin: 6px 0 5px; overflow: hidden; }
  .pf { height: 100%; border-radius: 3px; background: var(--good); }
  .pf.g { background: #3ddc97; } .pf.y { background: #e2c23b; } .pf.r { background: #ef5d5d; }
  .rt { color: var(--tx); font-size: 11px; font-weight: 600; }
  .rt.over { color: #ef8d5d; }   /* 100% 초과(전환·이월 사업) */
  .tag { font-size: 10.5px; padding: 1px 6px; border-radius: 5px; background: #1d2230; color: var(--mut); }
  .tag.n { color: var(--ac); } .tag.p { color: var(--prov); } .tag.l { color: var(--home); }
  .biz .a small { color: var(--mut); font-weight: 400; }

  /* 세부사업 → 통계목 드릴다운 */
  .biz.has-stat > .t { cursor: pointer; }
  .biz .nmrow { display: flex; align-items: baseline; gap: 6px; min-width: 0; flex: 1; }
  .biz .nmt { white-space: normal; word-break: keep-all; overflow-wrap: anywhere; }   /* 사업명 안 줄이고 다 표시(길면 줄바꿈) */
  .biz.has-stat .nmt { text-decoration: underline dotted #3a4550; text-underline-offset: 3px; }
  .badge { flex: none; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 4px; background: #22314e; color: #8fb4ff; letter-spacing: .3px; }
  .badge.sk { background: #123a2e; color: #3ddc97; }   /* 신속집행 대상 */
  .badge.chug { background: #3a2a1d; color: #e0a06a; }  /* 1차 추경 반영 */
  .badge.sb { background: #2a2440; color: #b79cf0; }    /* 소비투자 대상 */
  .bdgs { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }   /* 배지 전용 줄(집행/재원 아래) */
  .caret { flex: none; color: var(--mut); font-size: 9px; transition: transform .15s; }
  .biz.open .caret { transform: rotate(90deg); }
  .stat { display: none; margin: 7px 0 2px; padding: 9px 11px; background: #12151c; border: 1px solid var(--line); border-radius: 8px; }
  .biz.open .stat { display: block; }
  .grp + .grp { margin-top: 9px; }
  .grp-h { display: flex; justify-content: space-between; gap: 8px; font-size: 11.5px; font-weight: 700; color: #c7d2e6; padding-bottom: 4px; border-bottom: 1px dashed var(--line); }
  .grp-h .gc, .stt .sc { color: var(--mut); font-weight: 600; font-size: 10px; }
  .stt { display: flex; justify-content: space-between; gap: 8px; font-size: 12px; color: var(--tx); margin-top: 6px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .itm { margin: 3px 0 4px 9px; }
  .itm .ih { display: flex; justify-content: space-between; gap: 8px; font-size: 11.5px; color: var(--mut); font-variant-numeric: tabular-nums; }
  .dtl { padding-left: 11px; }
  .bss { font-size: 10.5px; color: #6b7488; padding-left: 8px; margin-top: 1px; }
  .stat small { color: var(--mut); font-weight: 400; margin-left: 2px; }
  .statft { margin-top: 8px; font-size: 10px; color: var(--mut); text-align: right; }
  /* 통계목 집행 — 한 줄 인라인(집행액 · 바 · %). 세부사업 바(.prog)와 확실히 구분 */
  .sx { display: flex; align-items: center; gap: 8px; margin: 2px 0 3px; padding-left: 20px; font-size: 10.5px; color: var(--mut); font-variant-numeric: tabular-nums; }
  .sx b { color: #c7d2e6; font-weight: 700; }
  .sx .sbar { flex: 1; min-width: 36px; height: 4px; background: #222836; border-radius: 3px; overflow: hidden; }
  .sx .sbar i { display: block; height: 100%; border-radius: 3px; }
  .sx .sbar i.g { background: #3ddc97; } .sx .sbar i.y { background: #e2c23b; } .sx .sbar i.r { background: #ef5d5d; }
  .sx .pct { min-width: 30px; text-align: right; font-weight: 700; color: #aeb8cc; }
  .sx .pct.over { color: #ef8d5d; }
  .execbox { border: 1px dashed #33465e; border-radius: 6px; padding: 5px 8px; margin: 3px 0 6px; background: rgba(139,180,255,.03); }   /* 통계목 집행+적요 묶음 박스 */
  .execbox .sx { margin: 0 0 2px; padding-left: 0; }
  .bss.sxd { padding-left: 8px; color: #7e879b; }   /* 통계목 적요(뭐에 썼나) */
  .stt .old { color: #ef5d5d; opacity: .8; font-weight: 400; }   /* 추경 전 금액(취소선) */
  .chg0 { font-size: 10px; color: #6b7488; padding-left: 8px; margin: 1px 0 3px; }   /* 1차추경 전 산출기초(취소선) */
  .chg0 s { color: #8a6a5a; }
  .stextra { margin-top: 7px; padding-top: 6px; border-top: 1px dashed var(--line); font-size: 10.5px; color: #e0a06a; display: flex; justify-content: space-between; }

  /* 책갈피 탭 — 상단 sticky, 모바일 가로스크롤 */
  .tabs { position: sticky; top: 0; z-index: 10; display: flex; gap: 6px; background: var(--bg);
          padding: 9px 0 7px; margin: 8px 0 2px; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tabs button { flex: 0 0 auto; background: var(--card); color: var(--mut); border: 1px solid var(--line);
                 border-radius: 99px; padding: 7px 15px; font-size: 13px; font-weight: 600; cursor: pointer;
                 white-space: nowrap; font-family: inherit; }
  .tabs button.act { background: var(--ac); color: #0a1020; border-color: var(--ac); }
  /* 하위 탭 — 상위(요약/예산/재정) 누르면 쭈루룩 펼쳐지는 밑줄형 탭 */
  .subtabs { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none;
             max-height: 0; opacity: 0; transition: max-height .28s ease, opacity .18s ease; }
  .subtabs::-webkit-scrollbar { display: none; }
  .subtabs.open { max-height: 48px; opacity: 1; margin: 2px 0 14px; }   /* 하위탭 ↔ 카드 간격 */
  .subtabs button { flex: 0 0 auto; background: transparent; color: var(--mut); border: 0;
                    border-bottom: 2px solid transparent; padding: 6px 12px 7px; font-size: 12.5px;
                    font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .subtabs button.act { color: var(--tx); border-bottom-color: var(--ac); }
  .tab.off { display: none; }
  footer { color: var(--mut); font-size: 12px; margin-top: 30px; line-height: 1.6; }
  a { color: var(--ac); }
  .empty { color: var(--mut); padding: 40px 0; text-align: center; }
</style>
</head>
<body>
  <div id="app"><p class="empty">데이터 불러오는 중…</p></div>

<script>
const 억 = v => Math.round((v || 0) / 1e8).toLocaleString();
// 정밀 금액 — 10억+ 정수억, 1천만~10억 소수1자리억, 그 미만 만원. 0 은 '' (태그 자체를 숨김)
const won = v => { v = v || 0;
  if (v >= 1e9) return Math.round(v / 1e8).toLocaleString() + '억';
  if (v >= 1e7) return (v / 1e8).toFixed(1) + '억';     // 0.1~9.9억
  if (v >= 1e4) return Math.round(v / 1e4).toLocaleString() + '만';  // 1~999만 (0 안 됨)
  if (v > 0) return '<1만';
  return ''; };
const esc = s => (s || '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
const cheon = v => v == null ? '' : v.toLocaleString();                 // 천원 원문값 콤마
const bss = arr => esc((arr || []).join(' · ')).replace(/\*/g, ' × ');  // 산출기초: * → ×
let STAT = {}, STAT_ORD = {};                                           // 통계목 트리 + 명세서(직제) 등장순
const statKey = (dept, biz) => dept + '' + biz;

let EXEC_ASOF = '';                                                     // 집행 기준일(재정공개 원장, summary.muju_exec_asof)
let OFFICIAL = null;                                                    // 공식 재정집행(소비투자·신속집행) 3.17 스냅샷
// 세부사업 클릭 → 통계목·부기명·산출기초. 예산=당초(천원), 집행(sp)·적요(spd)는 build 가 원장에서 병합.
function statTree(st) {
  const hasEx = (st.groups || []).some(g => (g.stats || []).some(s => s.sp != null)) || st.sp_extra;
  const bar = s => {                                    // 통계목 집행 = 한 줄(집행액 · 바 · %) + 적요(뭐에 썼나)
    if (s.sp == null) return '';
    const bud = (s.amt || 0) * 1000, sp = s.sp, r = bud > 0 ? Math.round(sp / bud * 100) : 0, over = bud > 0 && sp > bud;
    const desc = (s.spd && s.spd.length)   // 적요 한 줄씩(금액 큰 top3) + "외 N건"
      ? s.spd.map(d => `<div class="bss sxd">· ${esc(d[0]).replace(/\*+/g, '').replace(/\(\s*\)/g, '').trim()}</div>`).join('')
        + (s.spn && s.spn > s.spd.length ? `<div class="bss sxd" style="opacity:.6">···외 ${(s.spn - s.spd.length).toLocaleString()}건 (금액 큰 3건만)</div>` : '')
      : '';
    return `<div class="execbox"><div class="sx"><span>집행 <b>${won(sp) || '0'}</b></span><span class="sbar"><i class="${rateCls(r)}" style="width:${Math.min(r, 100)}%"></i></span><span class="pct ${over ? 'over' : ''}">${bud > 0 ? r + '%' : '추경'}</span></div>${desc}</div>`;
  };
  const body = (st.groups || []).map(g => `
    <div class="grp">
      <div class="grp-h"><span><span class="gc">${g.code}</span> ${esc(g.name)}</span><span>${cheon(g.amt)}<small>천원</small></span></div>
      ${(g.stats || []).map(s => `
        <div class="stt"><span><span class="sc">${s.code}</span> ${esc(s.name)}</span><span>${s.amt0 != null && s.amt0 !== s.amt ? `<s class="old">${cheon(s.amt0)}</s> ` : ''}${cheon(s.amt)}</span></div>
        ${bar(s)}
        ${(s.items || []).map(it => `
          <div class="itm">
            <div class="ih"><span>○ ${esc(it.name)}</span><span>${cheon(it.amt)}</span></div>
            ${it.basis && it.basis.length ? `<div class="bss">${bss(it.basis)}</div>` : ''}
            ${(it.detail || []).map(d => `
              <div class="dtl"><div class="ih"><span>― ${esc(d.name)}</span><span>${cheon(d.amt)}</span></div>
              ${d.basis && d.basis.length ? `<div class="bss">${bss(d.basis)}</div>` : ''}</div>`).join('')}
          </div>`).join('')}
        ${s.items0 && s.items0.length ? `<div class="chg0">1차추경 전 <s>${s.items0.map(it => esc(it.name) + (it.basis && it.basis.length ? ' (' + bss(it.basis) + ')' : '')).join(' · ')}</s></div>` : ''}`).join('')}
    </div>`).join('');
  const ftx = hasEx ? `예산현액(본예산±추경)·집행 병기 · 집행=재정공개 원장${EXEC_ASOF ? ' ' + EXEC_ASOF.slice(4, 6) + '/' + EXEC_ASOF.slice(6, 8) + ' 누계' : ''}` : '예산현액 기준 · 단위 천원 (산출기초는 원)';
  return `<div class="stat">${body}
    ${st.sp_extra ? `<div class="stextra"><span>추경·기타 통계목 집행</span><span>${won(st.sp_extra)}</span></div>` : ''}
    <div class="statft">${ftx}</div>
  </div>`;
}
const ymd = s => (s && s.length === 8) ? `${s.slice(0, 4)}-${s.slice(4, 6)}-${s.slice(6, 8)}` : s;
// 집행률 색: 70%+ 초록 · 50~69 노랑 · 50미만 빨강
const rateCol = r => r >= 70 ? '#3ddc97' : r >= 50 ? '#e2c23b' : '#ef5d5d';
const rateCls = r => r >= 70 ? 'g' : r >= 50 ? 'y' : 'r';
const C = getComputedStyle(document.documentElement);
const col = n => C.getPropertyValue('--' + n).trim();
const charts = [];
const MOBILE = matchMedia('(max-width: 640px)').matches;   // 모바일=칸/라벨 줄여 가독성 우선
function mk(el, opt) { const c = echarts.init(el, null, { renderer: 'canvas' }); c.setOption(opt); charts.push(c); return c; }
addEventListener('resize', () => charts.forEach(c => c.resize()));

const BASE = {
  backgroundColor: 'transparent',
  textStyle: { fontFamily: "system-ui,'Malgun Gothic',sans-serif", color: col('mut') },
  grid: { left: 4, right: 14, top: 8, bottom: 8, containLabel: true },
  tooltip: { confine: true, backgroundColor: '#0c0e13', borderColor: col('line'), textStyle: { color: col('tx') } },
};
// 홈 지자체 재원 라벨 (군/시 구분) — main 에서 설정
let FUND = { full: '시군비', short: '시군' };

function gauge(el, rate) {
  mk(el, {
    backgroundColor: 'transparent',
    series: [{
      type: 'gauge', min: 0, max: 100, radius: '96%', center: ['50%', '58%'],
      startAngle: 210, endAngle: -30,
      progress: { show: true, width: 16, itemStyle: { color: col('home') } },
      axisLine: { lineStyle: { width: 16, color: [[1, '#222836']] } },
      pointer: { show: false }, axisTick: { show: false }, splitLine: { show: false },
      axisLabel: { distance: -2, color: col('mut'), fontSize: 10 },
      anchor: { show: false },
      title: { show: false },
      detail: { valueAnimation: true, offsetCenter: [0, '-2%'], fontSize: 34, fontWeight: 800,
                color: col('tx'), formatter: '{value}%' },
      data: [{ value: rate }],
    }],
  });
}

function donut(el, items, palette) {
  // items: [{name, value}]
  mk(el, {
    ...BASE,
    tooltip: { ...BASE.tooltip, trigger: 'item',
      formatter: p => `${p.name}<br><b>${억(p.value)}억</b> (${p.percent}%)` },
    legend: { type: 'scroll', orient: 'horizontal', bottom: 0, textStyle: { color: col('mut'), fontSize: 11 },
              itemWidth: 10, itemHeight: 10 },
    color: palette,
    series: [{
      type: 'pie', radius: ['46%', '70%'], center: ['50%', '44%'], avoidLabelOverlap: true,
      itemStyle: { borderColor: col('card'), borderWidth: 2 },
      label: { show: false }, labelLine: { show: false },
      data: items,
    }],
  });
}

function bubble(el, units, homeName) {
  // 내는 것(x) vs 받는 것(y), 버블=인구, 색=시/군/홈. 대각선 위로 갈수록 수혜↑
  // 모바일: 버블 작게 + 라벨을 버블 '위'로 띄우고 + 겹치면 자동 숨김 → 글자가 버블에 안 가림
  const sz = p => Math.min(MOBILE ? 24 : 50, Math.max(MOBILE ? 7 : 11, Math.sqrt(p || 0) / (MOBILE ? 17 : 11)));
  mk(el, {
    ...BASE,

function treemap(el, depts, colorFn) {
  // 분야(기능별) 단일 레벨. 크기=편성액(비중), 색=colorFn(14시군 평균 대비 특화도).
  const byField = {};
  depts.forEach(d => (d.biz || []).forEach(b => {
    if (!(b.local > 0)) return;                 // 순수 시군비 예산 = 시군비(local) 있는 사업만
    const f = b.field || '기타';
    (byField[f] = byField[f] || []).push({ name: b.biz, value: b.local || 0, local: b.local || 0, natl: b.natl || 0, prov: b.prov || 0 });
  }));
  const data = Object.entries(byField).map(([f, kids]) => ({
    name: f, value: kids.reduce((s, k) => s + k.value, 0),
    itemStyle: colorFn ? { color: colorFn(f) } : undefined }))
    .filter(d => d.value > 0).sort((a, b) => b.value - a.value);
  const c = mk(el, {
    backgroundColor: 'transparent',
    tooltip: { confine: true, backgroundColor: '#0c0e13', borderColor: col('line'), textStyle: { color: col('tx') },
      formatter: p => `${p.name}<br>시군비 <b>${억(p.value)}억</b>` },
    series: [{
      type: 'treemap', roam: false, nodeClick: false, animation: false, squareRatio: 1, width: '100%', height: '100%', top: 3, bottom: 3, left: 2, right: 2,
      breadcrumb: { show: false },
      levels: [{ itemStyle: { borderColor: col('bg'), borderWidth: 2, gapWidth: 2 } }],
      label: { show: true, formatter: p => MOBILE ? p.name : `${p.name}\n${Math.round(p.value / 1e8).toLocaleString()}억`,
        lineHeight: 14, fontSize: MOBILE ? 9 : 12, color: '#fff', textBorderColor: 'rgba(0,0,0,.55)', textBorderWidth: MOBILE ? 1.5 : 2, overflow: 'truncate', ellipsis: '', minMargin: 1 },
      data,
    }],
  });
  // 분야 탭 → 아래에 주요 사업 3개
  const detail = document.getElementById('treeDetail');
  if (detail) c.on('click', p => {
    const pure = (byField[p.name] || []).filter(k => k.natl === 0 && k.prov === 0 && k.local > 0)
      .sort((a, b) => b.local - a.local).slice(0, 3);
    detail.style.color = col('mut');
    detail.innerHTML = pure.length
      ? `<b style="color:var(--tx)">${esc(p.name)}</b> 주요 자체사업 <span style="opacity:.7">(국·도비 제외)</span><br>` + pure.map(k => `· ${esc(k.name)} <b style="color:var(--good)">${억(k.local)}억</b>`).join('<br>')
      : `<b style="color:var(--tx)">${esc(p.name)}</b> — 순수 시군비 사업 거의 없음 (대부분 국·도비)`;
  });
}

// 범용 bar chart race. labels=프레임(연도·월), items=[{name,values,color}], opts={fmt,highlight}.
// yAxis 이름 고정. target 있으면(신속집행) 빈트랙=부서별 목표 오버레이+목표순 고정, 없으면 realtimeSort 재배치.
function raceChart(el, labels, items, opts) {
  opts = opts || {};
  const pct = opts.pct;                        // 진도율(%) 모드: values=%, abs=절대액
  const hasTarget = !pct && items.some(i => i.target > 0);   // 빈트랙 = 부서별 목표(신속집행 대상 예산)
  const last = labels.length - 1;
  const achv = i => i.target > 0 ? i.values[last] / i.target : -1;    // 달성률(집행/목표)
  if (hasTarget) items = [...items].sort((a, b) => achv(b) - achv(a));   // 달성률 순 고정 배치("신속집행 잘한 순")
  const maxV = pct ? Math.min(Math.max(...items.flatMap(i => i.values), 110), 160)   // 초반 스파이크 캡
                   : Math.max(...items.flatMap(i => i.values), ...items.map(i => i.target || 0), 1);
  const fmt = opts.fmt || (v => 억(v) + '억');
  const hl = opts.highlight;
  const gl = opts.goalLine || 0;               // 목표율 참조선(대상대비 %) — 막대 색 기준으로도 사용
  // 프레임별 목표선: opts.goalAt(fi) → {val,label} | null(선 제거). 없으면 고정 gl.
  const goalAt = opts.goalAt || (fi => gl ? { val: gl, label: '목표 ' + Math.round(gl) + '%' } : null);
  const mlFor = fi => { const g = pct ? goalAt(fi) : null;
    return g ? { silent: true, symbol: 'none', animationDurationUpdate: 900, lineStyle: { color: '#e2c23b', type: 'dashed', width: 1.5 }, data: [{ xAxis: g.val }], label: { show: true, formatter: g.label, position: 'insideEndTop', color: '#e2c23b', fontSize: 9.5, fontWeight: 700 } }
             : { silent: true, symbol: 'none', data: [], label: { show: false } }; };   // null=선 제거(2분기 목표 미공표 등)
  const dataFor = fi => items.map(i => ({ value: i.values[fi], abs: i.abs ? i.abs[fi] : null, target: i.target || 0, goal: i.goal || 0, itemStyle: { color: pct ? rateCol(i.values[fi] / (gl || 100) * 60) : i.color, borderRadius: [0, 4, 4, 0] } }));   // %모드=목표대비 색(목표=60점 기준)
  const execSeries = {
    realtimeSort: !hasTarget, type: 'bar', barWidth: '62%', data: dataFor(0), z: 3,
    showBackground: !hasTarget, backgroundStyle: { color: 'rgba(255,255,255,.05)', borderRadius: [0, 4, 4, 0] },
    markLine: pct ? mlFor(0) : undefined,
    label: { show: true, position: 'right', valueAnimation: true, fontSize: MOBILE ? 10 : 11.5, fontWeight: 600, color: col('tx'),
      formatter: pct ? (p => p.value + '%')                          // 달성률 %만(금액은 툴팁·클릭)
        : (hasTarget ? (p => p.data.target ? Math.round(p.value / p.data.target * 100) + '%' : fmt(p.value)) : (p => fmt(p.value))) },
  };
  const series = hasTarget
    ? [{ type: 'bar', barWidth: '62%', silent: true, z: 1, data: items.map(i => ({ value: i.target || 0 })),
         itemStyle: { color: 'rgba(255,255,255,.11)', borderRadius: [0, 4, 4, 0] } },      // 빈트랙=목표
       { ...execSeries, barGap: '-100%' }]                                                  // 집행(오버레이)
    : [execSeries];
  const c = mk(el, {
    backgroundColor: 'transparent',
    tooltip: (hasTarget || pct) ? { trigger: 'item', backgroundColor: '#0c0e13', borderColor: col('line'), textStyle: { color: col('tx') },
      formatter: p => {
        if (hasTarget && p.seriesIndex === 0) return '';            // 빈트랙(bg)엔 툴팁 없음
        if (pct) return `${p.name}<br>집행 <b>${억(p.data.abs)}억</b> / 대상 ${억(p.data.target)}억<br>대상대비 <b>${p.value}%</b>${p.data.goal && p.data.target ? ` <span style="color:#e2c23b">(목표 ${Math.round(p.data.goal / p.data.target * 100)}%)</span>` : ''}<br><span style="color:#8fb4ff">클릭 → 통계목 상세</span>`;
        const exec = p.value, tgt = p.data.target;
        return `${p.name}<br>집행 <b>${억(exec)}억</b> / 목표 ${억(tgt)}억<br>달성률 ${tgt ? Math.round(exec / tgt * 100) : 0}%`;
      } } : undefined,
    grid: { left: 4, right: pct ? 10 : (hasTarget ? 96 : (MOBILE ? 50 : 66)), top: 8, bottom: 8, containLabel: true },
    xAxis: { type: 'value', max: maxV, axisLabel: { formatter: pct ? (v => v + '%') : fmt, color: col('mut'), fontSize: 10 }, splitLine: { lineStyle: { color: col('line') } } },
    yAxis: { type: 'category', data: items.map(i => i.name), inverse: true, animationDuration: 300, animationDurationUpdate: 300,
      axisLine: { show: false }, axisTick: { show: false }, axisLabel: { interval: 0, fontSize: MOBILE ? 10 : 12, fontWeight: 600, color: v => hl && v === hl ? col('home') : col('tx') } },
    series,
    graphic: { elements: [{ type: 'text', id: 'raceYear', right: 14, bottom: MOBILE ? 44 : 54, z: 0, style: { text: labels[0], fontSize: MOBILE ? 15 : 22, fontWeight: 800, fill: 'rgba(255,255,255,.13)' } }] },
    animationDuration: 0, animationDurationUpdate: 900, animationEasing: 'linear', animationEasingUpdate: 'linear',
  });
  if (opts.onClick) c.on('click', p => { if (p.name && !(hasTarget && p.seriesIndex === 0)) opts.onClick(p.name); });   // 바 클릭 → 부서 드릴다운
  let timer = null, curFi = 0;
  function frame(fi) {
    curFi = fi;
    const upd = { data: dataFor(fi) };
    if (pct) upd.markLine = mlFor(fi);           // 목표선도 프레임 따라 이동(분기 전환 시 갱신/제거)
    const sd = hasTarget ? [{}, upd] : [upd];    // 집행 시리즈만 갱신(target 유지)
    c.setOption({ series: sd, graphic: { elements: [{ id: 'raceYear', style: { text: labels[fi] } }] } });
    if (opts.onFrame) opts.onFrame(labels[fi], fi);   // 프레임 라벨+인덱스를 카드 밖 요소(분기·누계 등)에 반영
  }
  // 정지점(분기말/반기말). opts.stops 없으면 마지막 프레임만.
  const stops = (opts.stops && opts.stops.length) ? opts.stops : [labels.length - 1];
  function segPlay(from, to) {                          // (from, to] 구간 애니 재생 후 정지
    if (timer) { clearInterval(timer); timer = null; }
    let fi = from; frame(Math.max(0, from));
    timer = setInterval(() => {
      fi++; frame(fi);
      if (fi >= to) { clearInterval(timer); timer = null; }
    }, 1100);
  }
  function play() { segPlay(-1, stops[0]); }            // 처음 → 첫 정지점(1분기말/상반기말)
  function jumpQuarter() {                              // 다음 정지점까지(마지막이면 처음부터 다시)
    const next = stops.find(s => s > curFi);
    if (next == null) segPlay(-1, stops[0]); else segPlay(curFi, next);
  }
  return { chart: c, play, jumpQuarter };
}

// 공식 재정집행(소비투자/신속집행) 부서별 순위 — 3.17 공식 스냅샷. 막대 그로인 애니 + 클릭 드릴다운.
function officialRace(el, ax, onClick) {
  const rows = [...ax.depts].sort((a, b) => b.rate - a.rate);
  const maxV = Math.min(Math.max(...rows.map(r => r.rate), 110), 160);
  const zero = rows.map(() => 0);
  const data = rows.map(r => ({ value: r.rate, exec: r.exec, goal: r.goal,
    itemStyle: { color: rateCol(r.rate), borderRadius: [0, 4, 4, 0] } }));
  const opt = {
    backgroundColor: 'transparent',
    tooltip: { trigger: 'item', backgroundColor: '#0c0e13', borderColor: col('line'), textStyle: { color: col('tx') },
      formatter: p => `${p.name}<br>집행 <b>${억(p.data.exec)}억</b> / 목표 ${억(p.data.goal)}억<br>${ax.label} 집행률 <b>${p.value}%</b><br><span style="color:#8fb4ff">클릭 → 통계목 상세</span>` },
    grid: { left: 4, right: 10, top: 8, bottom: 8, containLabel: true },
    xAxis: { type: 'value', max: maxV, axisLabel: { formatter: v => v + '%', color: col('mut'), fontSize: 10 }, splitLine: { lineStyle: { color: col('line') } } },
    yAxis: { type: 'category', data: rows.map(r => r.name), inverse: true,
      axisLine: { show: false }, axisTick: { show: false }, axisLabel: { interval: 0, fontSize: MOBILE ? 10 : 12, fontWeight: 600, color: col('tx') } },
    series: [{ type: 'bar', barWidth: '62%', data, showBackground: true,
      backgroundStyle: { color: 'rgba(255,255,255,.05)', borderRadius: [0, 4, 4, 0] },
      label: { show: true, position: 'right', fontSize: MOBILE ? 10 : 11.5, fontWeight: 600, color: col('tx'), formatter: p => p.value + '%' } }],
    animationDuration: 900, animationDelay: i => i * 35, animationEasing: 'cubicOut',
  };
  const c = mk(el, opt);
  if (onClick) c.on('click', p => { if (p.name) onClick(p.name); });
  function replay() { c.setOption({ series: [{ data: zero }] }); setTimeout(() => c.setOption({ series: [{ data }] }), 40); }
  return { chart: c, replay };
}

    if (b.prov > 0) t.push(`<span class="tag p">도비 ${won(b.prov)}</span>`);

  const ord = b => STAT_ORD[statKey(d.name, b.biz)];        // 예산서 직제순(명세서 등장순), 미매칭은 뒤로

        <div class="prog"><div class="pf ${rateCls(r)}" style="width:${Math.min(r, 100)}%"></div></div>

        ${st ? statTree(st) : ''}

async function main() {
  let s;
  try { s = await (await fetch('data/summary.json?_=' + Date.now())).json(); }
  catch (e) { document.getElementById('app').innerHTML = '<p class="empty">데이터가 아직 없습니다 (빌드 대기).</p>'; return; }

  EXEC_ASOF = s.muju_exec_asof || '';                                  // 집행 기준일
  try { STAT = await (await fetch('data/muju_tree.json?_=' + Date.now())).json(); }   // 예산+집행 병합본

  const allF = {}; let allTot = 0;             // 14시군 분야별 시군비 합·총

  const fFund = {};

  const homeTot = Object.values(fFund).reduce((s, e) => s + e.local, 0);
  // 편중배율(무주 분야비중 ÷ 14시군 평균)을 연속 색보간 — 빨강(0.5)→노랑(1.0=평균)→진초록(1.35)
  const CSTOPS = [[0.5, [239, 93, 93]], [0.85, [232, 169, 77]], [1.0, [226, 194, 59]], [1.15, [92, 184, 126]], [1.35, [14, 143, 82]]];
  const lp = (a, b, t) => Math.round(a + (b - a) * t);
  const ratioColor = r => {
    r = Math.max(0.5, Math.min(1.35, r));
    for (let i = 1; i < CSTOPS.length; i++) {
      if (r <= CSTOPS[i][0]) { const [r0, c0] = CSTOPS[i - 1], [r1, c1] = CSTOPS[i], t = (r - r0) / (r1 - r0);
        return `rgb(${lp(c0[0], c1[0], t)},${lp(c0[1], c1[1], t)},${lp(c0[2], c1[2], t)})`; }

    const mms = months.map(x => +String(x).slice(5, 7)), last = mms.length - 1;
    const stops = seg === 'sok'                          // 신속=상반기말(6월)·마지막 / 소비투자=1분기말(3월)
      ? [...new Set([mms.indexOf(6), last].filter(i => i >= 0))]
      : [last];

    const goalAt = seg === 'sok'
      ? (() => ({ val: ax.total.trate, label: '상반기 목표 ' + Math.round(ax.total.trate) + '%' }))
      : (() => ({ val: ax.total.trate, label: '1분기 목표 ' + ax.total.trate + '%' }));
    race2r = raceChart(document.getElementById('soksokChart'), months, items,
      { pct: true, goalLine: ax.total.trate, goalAt, stops, onClick: name => pickDept(name, true),
        onFrame: (lb, fi) => { const el = document.getElementById('soksokQ'); if (!el) return;
          const m = +String(lb).slice(5, 7), tot = ax.depts.reduce((a, d) => a + (d.values[fi] || 0), 0);
          const q = seg === 'sok' ? (m <= 6 ? '상반기' : '하반기') : (Math.ceil(m / 3) + '분기');
          const g = ax.total.goal, dt = ax.total.target;
          const isGoal = (seg === 'sok' && m === 6) || (seg === 'sobi' && m === 3);   // 목표 달성률은 목표시점에만(2분기 목표 없음)
          soksokQd = isGoal
            ? `집행 ${억(tot)}억 · 목표 ${억(g)}억 · 달성률 <b style="color:${rateCol(Math.round(tot / g * 100))}">${Math.round(tot / g * 100)}%</b>`
            : `집행 ${억(tot)}억 · 대상액 대비 <b>${Math.round(tot / dt * 100)}%</b>`;
          el.innerHTML = `<b>${q}(${m}월)</b> 집행 ${isGoal ? '결과' : '진행'} <span class="qinfo" onclick="soksokQToggle()" title="집행·목표·달성률 보기">ⓘ</span>`;
          const dv = document.getElementById('soksokQD');
          if (dv && dv.style.display !== 'none') dv.innerHTML = soksokQd;   // 열려 있으면 라이브 갱신
        } });
    race2r.play();
    document.querySelectorAll('.segtoggle button').forEach(b => b.classList.toggle('segon', b.dataset.seg === seg));
    const qb = document.getElementById('soksokQtr');
    if (qb) qb.style.display = 'none';   // 러닝이 각 제도 기간 끝(1분기말/상반기말)에서 끝나 정지점 버튼=다시재생과 동일 → 숨김(중간 정지점 생기면 복원)
  }
  if (hasRace2) {
    renderRace2('sobi');
    document.querySelectorAll('.segtoggle button').forEach(b => b.onclick = () => renderRace2(b.dataset.seg));
    document.getElementById('soksokReplay').onclick = () => race2r && race2r.play();
    document.getElementById('soksokQtr').onclick = () => race2r && race2r.jumpQuarter();
  }

  const manwon = v => Math.round(v / 1e4).toLocaleString() + '만';
  if (hasPop) {
    unitBar(document.getElementById('pcBudget'), s.units, home.name, 'pc_budget', manwon, '#c084fc');
    unitBar(document.getElementById('pcNatl'), s.units, home.name, 'pc_natl', manwon, '#37c98a');
  }
  if (hasTax) {
    bubble(document.getElementById('taxBubble'), s.units, home.name);
    unitBar(document.getElementById('benefitBar'), s.units, home.name, 'benefit', v => v + '배', '#f0a35b');
    unitBar(document.getElementById('taxBar'), s.units, home.name, 'pc_tax', manwon, '#e879a6');
  }

  // 2단 탭 — 상위(요약/예산/재정) 누르면 하위가 쭈루룩. 차트는 visible 상태 init이라 전환 시 보이는 것만 resize.
  const GROUPS = {
    overview: [],
    budget: [['dept', '부서별'], hasGrants && ['grant', '국·도비'], hasOwn && ['own', '순수 시군비 사업']].filter(Boolean),
    finance: [hasPop && ['percap', '1인당 재정'], hasTax && ['benefit', '지방세 대비']].filter(Boolean),
    comparison: [['unit', '시군 비교']],
  };
  const topBtns = [...document.querySelectorAll('#tabsTop button')];
  const subEl = document.getElementById('subtabs');
  function setTab(id) {
    document.querySelectorAll('.tab').forEach(s => s.classList.toggle('off', s.id !== 'tab-' + id));
    requestAnimationFrame(() => charts.forEach(c => { if (c.getDom().offsetParent) c.resize(); }));
    window.scrollTo({ top: 0 });
    if (id === 'unit' && racer) requestAnimationFrame(() => racer.play());   // 시군비교 열면 경주 자동 재생
    if (id === 'dept' && race2r) requestAnimationFrame(() => race2r.play());   // 부서별 열면 러닝 재생
  }
  function selectGroup(g) {
    topBtns.forEach(b => b.classList.toggle('act', b.dataset.g === g));
    const subs = GROUPS[g];
    if (!subs.length) { subEl.classList.remove('open'); subEl.innerHTML = ''; setTab(g); return; }
    subEl.innerHTML = subs.map(([id, lb], i) => `<button data-t="${id}"${i === 0 ? ' class="act"' : ''}>${lb}</button>`).join('');
    subEl.classList.add('open');
    subEl.querySelectorAll('button').forEach(b => b.onclick = () => {
      subEl.querySelectorAll('button').forEach(x => x.classList.toggle('act', x === b));
      setTab(b.dataset.t);
    });
    setTab(subs[0][0]);
  }
  topBtns.forEach(b => b.onclick = () => selectGroup(b.dataset.g));
  selectGroup('overview');
}
main();
</script>
</body>
</html>
