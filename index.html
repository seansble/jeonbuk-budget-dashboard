<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>전북 세출예산 집행 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  :root {
    --bg:#0f1116; --card:#171a21; --line:#262b36; --tx:#e7e9ee; --mut:#9aa0ab;
    --ac:#5b9cf0; --home:#f0a35b; --good:#3ddc97; --prov:#c084fc; --etc:#6b7280;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body { font-family: system-ui, 'Malgun Gothic', sans-serif; max-width: 1120px; margin: 0 auto;
         padding: 20px 18px calc(64px + env(safe-area-inset-bottom)); background: var(--bg); color: var(--tx);
         overflow-x: hidden; }
  h1 { font-size: clamp(18px, 5vw, 23px); margin: 0 0 4px; letter-spacing: -.4px; font-weight: 700; }
  h2 { font-size: 14px; margin: 26px 0 12px; color: var(--tx); font-weight: 600; letter-spacing: -.2px; }
  .sub { color: var(--mut); font-size: 12.5px; line-height: 1.5; }
  /* 집행률 범례 점 */
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 2px; vertical-align: middle; margin: -2px 3px 0 7px; }
  .dot:first-child { margin-left: 0; }
  .dot.g { background: #3ddc97; } .dot.y { background: #e2c23b; } .dot.r { background: #ef5d5d; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px;
          min-width: 0; overflow: hidden; }
  .card.home { border-color: var(--home); box-shadow: 0 0 0 1px var(--home) inset; }
  .ct { font-size: 12.5px; color: var(--mut); margin: 0 0 8px; font-weight: 600; }

  /* 반응형 그리드 — minmax 로 자동 줄바꿈(모바일 1단) */
  .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(min(270px, 100%), 1fr)); }
  .deptwrap { display: grid; gap: 12px; grid-template-columns: minmax(0, 1fr); }
  @media (min-width: 880px) { .deptwrap { grid-template-columns: minmax(0, 1.05fr) minmax(0, 1fr); align-items: start; } }

  .gauge-card { display: flex; flex-direction: column; }
  .badge { display: inline-block; background: var(--home); color: #1a1208; font-weight: 700;
           font-size: 12px; padding: 3px 10px; border-radius: 99px; }
  .kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; }
  .kpi { background: #11141a; border: 1px solid var(--line); border-radius: 10px; padding: 9px 11px; }
  .kpi .k { color: var(--mut); font-size: 11px; }
  .kpi .v { font-size: 16px; font-weight: 700; margin-top: 2px; font-variant-numeric: tabular-nums; }

  .ec { width: 100%; min-width: 0; }
  /* 부서 드릴다운 패널 */
  .panel { max-height: 460px; overflow-y: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .panel::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .upd { color: #ff5d5d; font-weight: 700; }
  .tag.hot { color: #ff9a6b; background: #2c1d16; font-weight: 600; }
  .gmax { color: var(--mut); font-size: 11px; }
  .panel-h { font-size: 14px; font-weight: 700; margin: 2px 0 4px; color: var(--home); }
  .panel-s { font-size: 11.5px; color: var(--mut); margin-bottom: 10px; }
  .biz { font-size: 13px; padding: 8px 0; border-bottom: 1px solid var(--line); }
  .biz:last-child { border-bottom: 0; }
  .biz .t { display: flex; justify-content: space-between; gap: 10px; align-items: baseline; }
  .biz .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .biz .a { color: var(--good); white-space: nowrap; font-variant-numeric: tabular-nums; font-weight: 600; }
  .biz .m { color: var(--mut); font-size: 11px; margin-top: 1px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .prog { height: 5px; background: #222836; border-radius: 3px; margin: 6px 0 5px; overflow: hidden; }
  .pf { height: 100%; border-radius: 3px; background: var(--good); }
  .pf.g { background: #3ddc97; } .pf.y { background: #e2c23b; } .pf.r { background: #ef5d5d; }
  .rt { color: var(--tx); font-size: 11px; font-weight: 600; }
  .tag { font-size: 10.5px; padding: 1px 6px; border-radius: 5px; background: #1d2230; color: var(--mut); }
  .tag.n { color: var(--ac); } .tag.p { color: var(--prov); } .tag.l { color: var(--home); }
  .biz .a small { color: var(--mut); font-weight: 400; }

  /* 책갈피 탭 — 상단 sticky, 모바일 가로스크롤 */
  .tabs { position: sticky; top: 0; z-index: 10; display: flex; gap: 6px; background: var(--bg);
          padding: 9px 0 7px; margin: 8px 0 2px; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tabs button { flex: 0 0 auto; background: var(--card); color: var(--mut); border: 1px solid var(--line);
                 border-radius: 99px; padding: 7px 15px; font-size: 13px; font-weight: 600; cursor: pointer;
                 white-space: nowrap; font-family: inherit; }
  .tabs button.act { background: var(--ac); color: #0a1020; border-color: var(--ac); }
  .tab.off { display: none; }
  footer { color: var(--mut); font-size: 12px; margin-top: 30px; line-height: 1.6; }
  a { color: var(--ac); }
  .empty { color: var(--mut); padding: 40px 0; text-align: center; }
</style>
</head>
<body>
  <div id="app"><p class="empty">데이터 불러오는 중…</p></div>

<script>
const 억 = v => Math.round((v || 0) / 1e8).toLocaleString();
// 정밀 금액 — 10억+ 정수억, 1천만~10억 소수1자리억, 그 미만 만원. 0 은 '' (태그 자체를 숨김)
const won = v => { v = v || 0;
  if (v >= 1e9) return Math.round(v / 1e8).toLocaleString() + '억';
  if (v >= 1e7) return (v / 1e8).toFixed(1) + '억';     // 0.1~9.9억
  if (v >= 1e4) return Math.round(v / 1e4).toLocaleString() + '만';  // 1~999만 (0 안 됨)
  if (v > 0) return '<1만';
  return ''; };
const esc = s => (s || '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
const ymd = s => (s && s.length === 8) ? `${s.slice(0, 4)}-${s.slice(4, 6)}-${s.slice(6, 8)}` : s;
// 집행률 색: 70%+ 초록 · 50~69 노랑 · 50미만 빨강
const rateCol = r => r >= 70 ? '#3ddc97' : r >= 50 ? '#e2c23b' : '#ef5d5d';
const rateCls = r => r >= 70 ? 'g' : r >= 50 ? 'y' : 'r';
const C = getComputedStyle(document.documentElement);
const col = n => C.getPropertyValue('--' + n).trim();
const charts = [];
function mk(el, opt) { const c = echarts.init(el, null, { renderer: 'canvas' }); c.setOption(opt); charts.push(c); return c; }
addEventListener('resize', () => charts.forEach(c => c.resize()));

const BASE = {
  backgroundColor: 'transparent',
  textStyle: { fontFamily: "system-ui,'Malgun Gothic',sans-serif", color: col('mut') },
  grid: { left: 4, right: 14, top: 8, bottom: 8, containLabel: true },
  tooltip: { confine: true, backgroundColor: '#0c0e13', borderColor: col('line'), textStyle: { color: col('tx') } },
};
// 홈 지자체 재원 라벨 (군/시 구분) — main 에서 설정
let FUND = { full: '시군비', short: '시군' };

function gauge(el, rate) {
  mk(el, {
    backgroundColor: 'transparent',
    series: [{
      type: 'gauge', min: 0, max: 100, radius: '96%', center: ['50%', '58%'],
      startAngle: 210, endAngle: -30,
      progress: { show: true, width: 16, itemStyle: { color: col('home') } },
      axisLine: { lineStyle: { width: 16, color: [[1, '#222836']] } },
      pointer: { show: false }, axisTick: { show: false }, splitLine: { show: false },
      axisLabel: { distance: -2, color: col('mut'), fontSize: 10 },
      anchor: { show: false },
      title: { show: false },
      detail: { valueAnimation: true, offsetCenter: [0, '-2%'], fontSize: 34, fontWeight: 800,
                color: col('tx'), formatter: '{value}%' },
      data: [{ value: rate }],
    }],
  });
}

function donut(el, items, palette) {
  // items: [{name, value}]
  mk(el, {
    ...BASE,
    tooltip: { ...BASE.tooltip, trigger: 'item',
      formatter: p => `${p.name}<br><b>${억(p.value)}억</b> (${p.percent}%)` },
    legend: { type: 'scroll', orient: 'horizontal', bottom: 0, textStyle: { color: col('mut'), fontSize: 11 },
              itemWidth: 10, itemHeight: 10 },
    color: palette,
    series: [{
      type: 'pie', radius: ['46%', '70%'], center: ['50%', '44%'], avoidLabelOverlap: true,
      itemStyle: { borderColor: col('card'), borderWidth: 2 },
      label: { show: false }, labelLine: { show: false },
      data: items,
    }],
  });
}

function unitBar(el, units, homeName, valKey, fmt, color) {
  const arr = [...units].sort((a, b) => a[valKey] - b[valKey]); // 오름차순 → 큰 게 위
  mk(el, {
    ...BASE,
    grid: { left: 4, right: 52, top: 6, bottom: 6, containLabel: true },
    tooltip: { ...BASE.tooltip, trigger: 'axis', axisPointer: { type: 'shadow' },
      formatter: p => `${p[0].name}<br><b>${fmt(p[0].value)}</b>` },
    xAxis: { type: 'value', axisLabel: { show: false }, splitLine: { show: false }, axisLine: { show: false } },
    yAxis: { type: 'category', data: arr.map(u => u.name),
             axisLine: { show: false }, axisTick: { show: false },
             axisLabel: { fontSize: 11.5, fontWeight: 600,
                          color: v => v === homeName ? col('home') : col('tx') } },
    series: [{
      type: 'bar', barWidth: '64%', data: arr.map(u => ({
        value: u[valKey],
        itemStyle: { color: u.name === homeName ? col('home') : color, borderRadius: [0, 4, 4, 0] },
      })),
      label: { show: true, position: 'right', distance: 6, fontSize: 11.5, fontWeight: 600,
               color: col('tx'), formatter: p => fmt(p.value) },
    }],
  });
}

function deptBar(el, depts, onPick) {
  const h = Math.max(260, depts.length * 22 + 40);
  el.style.height = h + 'px';
  const arr = [...depts].reverse(); // depts=직제순 → reverse 로 첫 부서가 맨 위
  const c = mk(el, {
    ...BASE,
    grid: { left: 4, right: 46, top: 6, bottom: 6, containLabel: true },
    tooltip: { ...BASE.tooltip, trigger: 'axis', axisPointer: { type: 'shadow' },
      formatter: p => { const d = arr[p[0].dataIndex];
        return `${d.name}<br>편성 <b>${억(d.budget)}억</b> · 집행 ${억(d.spent)}억 (${d.rate}%)<br>사업 ${d.count}건`; } },
    xAxis: { type: 'value', axisLabel: { show: false }, splitLine: { show: false }, axisLine: { show: false } },
    yAxis: { type: 'category', data: arr.map(d => d.name),
             axisLine: { show: false }, axisTick: { show: false }, axisLabel: { color: col('tx'), fontSize: 11 } },
    series: [
      { type: 'bar', barWidth: '58%', z: 1, data: arr.map(d => d.budget),
        itemStyle: { color: '#222836', borderRadius: 4 },
        label: { show: true, position: 'right', color: col('mut'), fontSize: 10.5, formatter: p => 억(p.value) + '억' } },
      { type: 'bar', barWidth: '58%', z: 2, barGap: '-100%',
        data: arr.map(d => ({ value: d.spent, itemStyle: { color: rateCol(d.rate), borderRadius: 4 } })) },
    ],
  });
  c.on('click', p => onPick(arr[p.dataIndex]));
  return arr;
}

function deptPanel(el, d) {
  const fund = (b) => {
    const t = [];
    if (b.natl > 0) t.push(`<span class="tag n">국비 ${won(b.natl)}</span>`);
    if (b.prov > 0) t.push(`<span class="tag p">도비 ${won(b.prov)}</span>`);
    if (b.local > 0) t.push(`<span class="tag l">${FUND.full} ${won(b.local)}</span>`);
    return t.join('');
  };
  el.innerHTML = `
    <div class="panel-h">${esc(d.name)}</div>
    <div class="panel-s">편성 ${won(d.budget)} · 집행 ${won(d.spent)} (${d.rate}%) · 세부사업 ${d.count}건 · 국비 ${won(d.natl) || '0'}</div>
    ${d.biz.map(b => {
      const r = b.budget ? Math.round(b.spent / b.budget * 100) : 0;
      return `
      <div class="biz">
        <div class="t"><span class="nm">${esc(b.biz)}</span><span class="a">${won(b.spent) || '0'} <small>/ ${won(b.budget) || '0'}</small></span></div>
        <div class="prog"><div class="pf ${rateCls(r)}" style="width:${Math.min(r, 100)}%"></div></div>
        <div class="m"><span class="rt">집행 ${r}%</span><span class="tag">${esc(b.field || '-')}</span>${fund(b)}</div>
      </div>`; }).join('')}`;
}

function localOnly(list) {
  return list.map(b => `
    <div class="biz">
      <div class="t"><span class="nm">${esc(b.biz)}</span><span class="a">${won(b.local) || '0'}</span></div>
      <div class="prog"><div class="pf ${rateCls(b.rate)}" style="width:${Math.min(b.rate, 100)}%"></div></div>
      <div class="m"><span class="rt">집행 ${b.rate}%</span><span class="tag">${esc(b.dept || '-')}</span><span class="tag">${esc(b.field || '-')}</span></div>
    </div>`).join('');
}

function grants(list) {
  return list.map(m => `
    <div class="biz">
      <div class="t"><span class="nm">${esc(m.biz)}</span><span class="a">${won(m.avg) || '<1만'} <small>평균</small></span></div>
      <div class="m"><span class="tag hot">${m.n_units}개 시군</span><span class="tag">${esc(m.field || '-')}</span>
        <span class="gmax">최대 ${esc(m.max_unit)} ${won(m.max) || '<1만'}</span></div>
    </div>`).join('');
}

async function main() {
  let s;
  try { s = await (await fetch('data/summary.json?_=' + Date.now())).json(); }
  catch (e) { document.getElementById('app').innerHTML = '<p class="empty">데이터가 아직 없습니다 (빌드 대기).</p>'; return; }

  const home = s.units.find(u => u.home) || s.units[0];
  const sorted = [...s.units].sort((a, b) => b.rate - a.rate);
  const rank = sorted.findIndex(u => u.name === home.name) + 1;
  const natlRank = [...s.units].sort((a, b) => b.natl_rate - a.natl_rate).findIndex(u => u.name === home.name) + 1;
  // 1인당 재정 — 인구 있을 때만. 절대액은 규모편향이라 1인당이 공정비교.
  const hasPop = s.units.some(u => u.pc_budget > 0);
  const pcRank = [...s.units].sort((a, b) => b.pc_budget - a.pc_budget).findIndex(u => u.name === home.name) + 1;
  const topBudgetName = [...s.units].sort((a, b) => b.budget - a.budget)[0].name;

  const fields = Object.entries(home.fields).map(([f, v]) => ({ name: f, value: v.spent }))
    .sort((a, b) => b.value - a.value).slice(0, 9);
  FUND = home.type === '군' ? { full: '군비', short: '군' }
       : home.type === '시' ? { full: '시비', short: '시' }
       : { full: '시군비', short: '시군' };
  const hasGrants = !!(s.home && s.home.missing_grants && s.home.missing_grants.length);
  const hasOwn = !!(s.home && s.home.local_only && s.home.local_only.length);
  const deptCount = ((s.home && s.home.depts) || []).length;
  const etc = Math.max(0, home.budget - home.natl - home.prov - home.local);
  const funds = [
    { name: '국비', value: home.natl }, { name: '도비', value: home.prov },
    { name: FUND.full, value: home.local }, { name: '자체·기타', value: etc },
  ].filter(x => x.value > 0);

  document.getElementById('app').innerHTML = `
    <h1>${esc(s.region)} 세출예산 집행</h1>
    <p class="sub">${esc(s.dataset)} · 회계연도 ${s.fyr} · 기준일 ${ymd(s.asof)} · 갱신 <span class="upd">${esc(s.updated)}</span></p>

    <div class="tabs">
      <button data-t="overview" class="act">요약</button>
      <button data-t="dept">부서별</button>
      <button data-t="unit">시군 비교</button>
      ${hasPop ? `<button data-t="percap">1인당 재정</button>` : ''}
      ${hasGrants ? `<button data-t="grant">국·도비</button>` : ''}
      ${hasOwn ? `<button data-t="own">${FUND.full}사업</button>` : ''}
    </div>

    <section class="tab" id="tab-overview">
      <h2>${esc(home.name)} 한눈에</h2>
      <div class="grid">
        <div class="card home gauge-card">
          <div class="ct">집행률 <span class="badge">14곳 중 ${rank}위</span></div>
          <div id="gauge" class="ec" style="height:180px"></div>
          <div class="kpis">
            <div class="kpi"><div class="k">편성</div><div class="v">${억(home.budget)}억</div></div>
            <div class="kpi"><div class="k">지출</div><div class="v">${억(home.spent)}억</div></div>
            <div class="kpi"><div class="k">세부사업</div><div class="v">${home.biz_count.toLocaleString()}건</div></div>
            <div class="kpi"><div class="k">국비 (비중 ${natlRank}위)</div><div class="v">${억(home.natl)}억</div></div>
          </div>
        </div>
        <div class="card"><div class="ct">분야별 지출</div><div id="fieldDonut" class="ec" style="height:240px"></div></div>
        <div class="card"><div class="ct">재원 구성 (편성 기준)</div><div id="fundDonut" class="ec" style="height:240px"></div></div>
      </div>
    </section>

    <section class="tab off" id="tab-dept">
      <h2>부서별 예산 · 세부사업 (막대를 누르면 펼쳐집니다)</h2>
      <div class="deptwrap">
        <div class="card"><div class="ct">부서별 집행률 · ${deptCount}개 부서 <span style="white-space:nowrap"><span class="dot g"></span>70%↑<span class="dot y"></span>50~69<span class="dot r"></span>50%미만</span></div><div id="deptBar" class="ec"></div></div>
        <div class="card"><div id="deptPanel" class="panel"></div></div>
      </div>
    </section>

    <section class="tab off" id="tab-unit">
      <h2>전북 14개 시군 비교</h2>
      <div class="grid">
        <div class="card"><div class="ct">집행률 (%)</div><div id="unitRate" class="ec" style="height:360px"></div></div>
        <div class="card"><div class="ct">국비 비중 — "누가 국비 잘 따나" (%)</div><div id="unitNatl" class="ec" style="height:360px"></div></div>
      </div>
    </section>

    ${hasPop ? `
    <section class="tab off" id="tab-percap">
      <h2>1인당 재정 <span class="sub" style="font-weight:400">— 인구로 나눈 진짜 재정력 (절대액은 규모 편향)</span></h2>
      <div class="grid">
        <div class="card"><div class="ct">1인당 편성액 <span class="badge">${esc(home.name)} ${pcRank}위</span></div><div id="pcBudget" class="ec" style="height:360px"></div></div>
        <div class="card"><div class="ct">1인당 국비 확보액</div><div id="pcNatl" class="ec" style="height:360px"></div></div>
      </div>
      <p class="sub" style="margin-top:10px">절대 편성 1위 <b>${esc(topBudgetName)}</b>도 1인당으론 최하위 — 인구가 적을수록 1인당 재정이 큽니다. · 인구 기준: ${esc(s.pop_source || '')}</p>
    </section>` : ''}

    ${hasGrants ? `
    <section class="tab off" id="tab-grant">
      <h2>${esc(home.name)}엔 없는 국·도비 사업 <span class="sub" style="font-weight:400">— 다른 시군은 받는데 미편성 (많이 받는 순)</span></h2>
      <div class="card">${grants(s.home.missing_grants)}</div>
      <p class="sub" style="margin-top:8px">※ 사업명 매칭 기반 — 시군마다 명칭이 달라 일부 오차 가능(참고용).</p>
    </section>` : ''}

    ${hasOwn ? `
    <section class="tab off" id="tab-own">
      <h2>${esc(home.name)} 자체사업 (${FUND.full}) <span class="sub" style="font-weight:400">— 국비·도비 없이 ${FUND.full}만, 금액순</span></h2>
      <div class="card">${localOnly(s.home.local_only)}</div>
    </section>` : ''}`;

  gauge(document.getElementById('gauge'), home.rate);
  donut(document.getElementById('fieldDonut'), fields,
    [col('ac'), col('good'), col('home'), col('prov'), '#e879a6', '#60d4d4', '#a3b18a', '#f4a261', col('etc')]);
  donut(document.getElementById('fundDonut'), funds, [col('ac'), col('good'), col('home'), col('etc')]);

  const depts = (s.home && s.home.depts) || [];
  deptBar(document.getElementById('deptBar'), depts, d => deptPanel(document.getElementById('deptPanel'), d));
  if (depts.length) deptPanel(document.getElementById('deptPanel'), [...depts].sort((a, b) => b.budget - a.budget)[0]);

  unitBar(document.getElementById('unitRate'), s.units, home.name, 'rate', v => v + '%', '#4a8fe8');
  unitBar(document.getElementById('unitNatl'), s.units, home.name, 'natl_rate', v => v + '%', '#37c98a');

  if (hasPop) {
    const manwon = v => Math.round(v / 1e4).toLocaleString() + '만';
    unitBar(document.getElementById('pcBudget'), s.units, home.name, 'pc_budget', manwon, '#c084fc');
    unitBar(document.getElementById('pcNatl'), s.units, home.name, 'pc_natl', manwon, '#37c98a');
  }

  // 책갈피 탭 — 차트는 전부 visible 상태에서 init 됐으니 크기 정상. 전환 시 보이는 차트만 resize.
  const tabBtns = [...document.querySelectorAll('.tabs button')];
  function setTab(id) {
    document.querySelectorAll('.tab').forEach(s => s.classList.toggle('off', s.id !== 'tab-' + id));
    tabBtns.forEach(b => b.classList.toggle('act', b.dataset.t === id));
    requestAnimationFrame(() => charts.forEach(c => { if (c.getDom().offsetParent) c.resize(); }));
    window.scrollTo({ top: 0 });
  }
  tabBtns.forEach(b => b.onclick = () => setTab(b.dataset.t));
  setTab('overview');
}
main();
</script>
</body>
</html>
